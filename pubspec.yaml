name: susflow
description: "Calculadora clínica SUS com motores de cálculo integrados para protocolos de saúde (Cardio, Wells, Lab) com telemetria."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  intl: ^0.19.0 # Para formatação de moeda (R$)
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
